<header class="header">
  <a routerLink="/" class="logo">DataShare</a>

  <nav class="nav">
    @if (authService.isAuthenticated()) {
      <a routerLink="/my-files" mat-button class="nav-link">Mon espace</a>
      <button mat-stroked-button (click)="logout()" class="nav-link">Déconnexion</button>
    } @else {
      <button mat-flat-button (click)="openLoginDialog()" class="btn-login">Se connecter</button>
    }
  </nav>
</header>
