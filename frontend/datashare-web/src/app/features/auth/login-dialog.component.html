<div class="auth-modal">
  <h2 class="auth-title">Connexion</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="field">
      <label for="login-email">Email</label>
      <input
        id="login-email"
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="Saisissez votre email..."
        [class.invalid]="form.controls.email.invalid && form.controls.email.touched">
      @if (form.controls.email.hasError('email') && form.controls.email.touched) {
        <small class="field-error">Format d'email invalide</small>
      }
    </div>

    <div class="field">
      <label for="login-password">Mot de passe</label>
      <input
        id="login-password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="Saisissez votre mot de passe..."
        [class.invalid]="form.controls.password.invalid && form.controls.password.touched">
    </div>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <button type="button" class="link-switch" (click)="switchToRegister()">
      Créer un compte
    </button>

    <button type="submit" class="btn-submit" [disabled]="loading || form.invalid">
      {{ loading ? 'Connexion...' : 'Connexion' }}
    </button>
  </form>
</div>
