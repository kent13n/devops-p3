<div class="file-row" [class.file-row-expired]="file.isExpired || file.isPurged">
  <div class="file-icon-wrapper">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="9" cy="13" r="1.5" stroke="currentColor" stroke-width="2"/>
      <path d="M20 17L16 13L10 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="file-info">
    <p class="file-name">{{ file.originalName }}</p>
    <p class="file-meta" [class.expired]="file.isExpired || file.isPurged">
      {{ expirationText }}
    </p>
  </div>

  @if (file.isExpired || file.isPurged) {
    <p class="file-expired-msg">Ce fichier a expiré, il n'est plus stocké chez nous</p>
  } @else {
    @if (file.isProtected) {
      <span class="file-lock" title="Protégé par mot de passe">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M7 11V7C7 4.23858 9.23858 2 12 2C14.7614 2 17 4.23858 17 7V11" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
    }

    <button type="button" class="btn-action btn-delete" (click)="onDelete()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 6H21M8 6V4C8 2.89543 8.89543 2 10 2H14C15.1046 2 16 2.89543 16 4V6M19 6V20C19 21.1046 18.1046 22 17 22H7C5.89543 22 5 21.1046 5 20V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Supprimer
    </button>

    <a
      class="btn-action btn-access"
      [href]="file.downloadUrl"
      target="_blank"
      rel="noopener noreferrer">
      Accéder
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  }
</div>
