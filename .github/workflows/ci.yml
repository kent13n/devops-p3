name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        run: dotnet restore backend/DataShare.sln
      - name: Build
        run: dotnet build backend/DataShare.sln --no-restore --configuration Release
      - name: Test avec couverture
        run: dotnet test backend/DataShare.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --settings backend/coverlet.runsettings
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: '**/coverage.cobertura.xml'

  frontend:
    name: Frontend (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/datashare-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/datashare-web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npx ng build --configuration=production
      - name: Unit tests
        run: npm test

  security:
    name: Scans de sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: .NET vulnerable packages
        run: dotnet list backend/DataShare.sln package --vulnerable --include-transitive
      - name: npm audit (high et plus)
        working-directory: frontend/datashare-web
        run: npm audit --audit-level=high
        continue-on-error: true
